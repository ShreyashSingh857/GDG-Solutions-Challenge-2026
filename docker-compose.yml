version: '3.9'
services:
  event-bus:
    build: ./event-bus
    ports:
      - "4000:4000"
    working_dir: /app
    command: node index.js
    volumes:
      - ./event-bus:/app
      - ./shared:/shared
    environment:
      - NODE_ENV=production

  disruption:
    build: ./disruption
    ports:
      - "3001:3001"
    working_dir: /app
    command: node index.js
    volumes:
      - ./disruption:/app
      - ./shared:/shared
    environment:
      - NODE_ENV=production
      - EVENT_BUS_URL=http://event-bus:4000
    depends_on:
      - event-bus

  impact:
    build: ./impact
    ports:
      - "3002:3002"
    working_dir: /app
    command: node index.js
    volumes:
      - ./impact:/app
      - ./shared:/shared
    environment:
      - NODE_ENV=production
      - EVENT_BUS_URL=http://event-bus:4000
    depends_on:
      - event-bus

  resolution:
    build: ./resolution
    ports:
      - "3003:3003"
    working_dir: /app
    command: node index.js
    volumes:
      - ./resolution:/app
      - ./shared:/shared
    environment:
      - NODE_ENV=production
      - EVENT_BUS_URL=http://event-bus:4000
    depends_on:
      - event-bus

  news-intel:
    build: ./news-intel
    ports:
      - "3005:3005"
    working_dir: /app
    command: node index.js
    volumes:
      - ./news-intel:/app
      - ./shared:/shared
    environment:
      - NODE_ENV=production
      - EVENT_BUS_URL=http://event-bus:4000
      - DISRUPTION_AGENT_URL=http://disruption:3001
      - NEWS_CRON_SCHEDULE=*/15 * * * *
    depends_on:
      - event-bus
      - disruption

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    working_dir: /app
    command: npm run start
    volumes:
      - ./dashboard:/app
    environment:
      - NODE_ENV=production
    depends_on:
      - event-bus
