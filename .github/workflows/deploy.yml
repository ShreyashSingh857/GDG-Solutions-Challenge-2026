name: CI/CD Pipeline

on:
  pull_request:
    paths:
      - 'shared/**'
      - 'dashboard/**'
      - 'event-bus/**'
      - 'disruption/**'
      - 'impact/**'
      - 'resolution/**'
      - 'news-intel/**'
      - '.github/workflows/deploy.yml'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main]
    paths:
      - 'shared/**'
      - 'dashboard/**'
      - 'event-bus/**'
      - 'disruption/**'
      - 'impact/**'
      - 'resolution/**'
      - 'news-intel/**'
      - '.github/workflows/deploy.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  validate-dashboard:
    name: Dashboard lint and build
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    defaults:
      run:
        working-directory: dashboard
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: dashboard/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('dashboard/package-lock.json') }}-${{ hashFiles('dashboard/next.config.mjs', 'dashboard/app/**/*.js', 'dashboard/components/**/*.js') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('dashboard/package-lock.json') }}-

      - name: Run dashboard lint
        run: npm run lint

      - name: Build dashboard (single invocation)
        run: npm run build

  validate-backend:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run backend lint suite
        run: npm run lint

  validate-resolution:
    name: Resolution tests and lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resolution
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: resolution/package-lock.json

      - name: Install resolution dependencies
        run: npm ci

      - name: Run resolution tests
        run: npm test

