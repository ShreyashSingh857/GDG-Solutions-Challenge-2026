name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install event-bus deps
        run: cd event-bus && npm install
      - name: Install disruption deps
        run: cd disruption && npm install
      - name: Install impact deps
        run: cd impact && npm install
      - name: Install resolution deps
        run: cd resolution && npm install
      - name: Install dashboard deps
        run: cd dashboard && npm install
      - name: Lint dashboard
        run: cd dashboard && npm run lint
      - name: Deploy event-bus to Render (stub)
        run: echo "Add RENDER_DEPLOY_HOOK_EVENT_BUS secret and uncomment curl call in Phase 4"
      - name: Deploy agents to Render (stub)
        run: echo "Add RENDER_DEPLOY_HOOK_* secrets and uncomment in Phase 4"
      - name: Deploy dashboard to Vercel (stub)
        run: echo "Add VERCEL_TOKEN secret and uncomment in Phase 4"
